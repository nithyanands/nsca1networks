---
- hosts: web
  become: yes

  tasks:
    - name: Clone or update repository
      git:
        repo: https://github.com/dbsspencerjohn-dot/ca1networks.git
        dest: /home/ubuntu/app
        version: main
        update: yes

    - name: Run Docker Compose
      become_user: ubuntu
      command: docker compose up -d --build
      args:
        chdir: /home/ubuntu/app
